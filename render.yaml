services:
  # Web Service - Dashboard and API
  - type: web
    name: alphatrades-web
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn --worker-class gevent --workers 2 --timeout 300 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: alphatrades-db
          property: connectionString
      - key: ALPACA_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: ALPACA_SECRET_KEY
        sync: false  # Set manually in Render dashboard
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: ALPACA_DATA_URL
        value: https://data.alpaca.markets
      - key: TRADING_MODE
        value: paper
  
  # Background Worker - Market Monitor
  - type: worker
    name: alphatrades-worker
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: alphatrades-db
          property: connectionString
      - key: ALPACA_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: ALPACA_SECRET_KEY
        sync: false  # Set manually in Render dashboard
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: ALPACA_DATA_URL
        value: https://data.alpaca.markets
      - key: TRADING_MODE
        value: paper

databases:
  - name: alphatrades-db
    databaseName: alphatrades
    user: alphatrades
    plan: starter  # $7/month
    region: oregon
