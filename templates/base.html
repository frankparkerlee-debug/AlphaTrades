<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}AlphaTrades{% endblock %}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        nav {
            background: rgba(0,0,0,0.3);
            padding: 15px 0;
            margin-bottom: 20px;
        }
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        nav a:hover {
            background: rgba(255,255,255,0.2);
        }
        nav a.active {
            background: rgba(255,255,255,0.3);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        h1 { color: #2a5298; margin-bottom: 10px; }
        h2 { color: #2a5298; margin-top: 30px; margin-bottom: 15px; border-bottom: 2px solid #e9ecef; padding-bottom: 10px; }
        
        .grade-A { background: #28a745; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .grade-B { background: #ffc107; color: #856404; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .grade-C { background: #fd7e14; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .grade-D { background: #dc3545; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        
        .positive { color: #28a745; font-weight: bold; }
        .negative { color: #dc3545; font-weight: bold; }
        
        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">📊 Stock Cards</a></li>
            <li><a href="/trader" class="{% if request.path == '/trader' %}active{% endif %}">💼 Trader Simulation</a></li>
            <li><a href="/feed" class="{% if request.path == '/feed' %}active{% endif %}">📋 Options Feed</a></li>
        </ul>
    </nav>
    
    {% block content %}{% endblock %}
    
    {% block scripts %}{% endblock %}
</body>
</html>
